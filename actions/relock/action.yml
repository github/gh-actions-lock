name: Relock actions.lock
description: Relock the actions.lock file after dependency updates (e.g. Dependabot PRs)

inputs:
  extra-flags:
    description: Extra flags passed to gh actions-lock (e.g. "--allow-runners foo")
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: OIDC Setup for goproxy
      uses: github/setup-goproxy@v1.1.0

    - uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/../../go.mod

    - name: Build gh-actions-lock
      shell: bash
      run: |
        cd "${{ github.action_path }}/../.."
        go build -o "$RUNNER_TEMP/gh-actions-lock" ./cmd/gh-actions-lock

    - name: Relock
      shell: bash
      run: |
        "$RUNNER_TEMP/gh-actions-lock" --no-interactive -A ${{ inputs.extra-flags }}
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Commit updated lockfile
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .github/workflows/actions.lock
        if git diff --cached --quiet; then
          echo "Lockfile already up to date"
        else
          git commit -m "Relock actions.lock after dependency update"
          git push
        fi
