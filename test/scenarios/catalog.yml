# Shared scenario catalog for gh-actions-lock integration tests.
#
# Both the Ruby integration harness (test/integration/) and the Go scenario
# loader (test/scenarios/) consume this file. Each scenario describes:
#
#   name:        unique identifier (snake_case)
#   category:    grouping for matrix display
#   description: what the scenario validates
#   needs_token: true if the scenario requires a real GH_TOKEN
#   needs_stub:  true if the scenario uses a stub HTTP server
#   tags:        labels for filtering (e.g. "smoke", "security")
#   flags:       CLI flags passed to the binary
#   fixtures:    inline workflow/lockfile content (Ruby-side hydrates these)
#   expect:      expected exit code and output assertions
#
# The Ruby harness adds stub server wiring and custom assertions on top of
# what's declared here. The Go side uses these for table-driven scenario
# validation and matrix reporting.
#
# Scenarios with needs_token: true require a real GH_TOKEN and are
# skipped gracefully when no token is present.

version: 1

categories:
  - name: happy_path
    description: "Normal operation — actions resolve and pin successfully"
  - name: sso_auth
    description: "SAML SSO enforcement and authorization flows"
  - name: api_errors
    description: "GitHub API error conditions (404, 429, 5xx, timeout)"
  - name: lockfile
    description: "Lockfile loading, trust, corruption, and version handling"
  - name: workflow_parsing
    description: "Workflow file parsing edge cases"
  - name: output_modes
    description: "CLI flag combinations (--json, --no-fix, --rescan)"
  - name: multi_workflow
    description: "Cross-workflow scenarios and dependency tracking"
  - name: security
    description: "Impostor commit, lockfile forgery, reachability"
  - name: narrowing
    description: "Tag narrowing, --no-narrow, sticky precision, and version-ref nudges"
  - name: onboarding
    description: "--no-onboard gating, onboarding-required findings, and CI flag composition"
  - name: dependabot
    description: "Dependabot consumer contract — JSON findings shape, exit codes, and category/severity for --no-onboard --no-narrow --no-interactive"

scenarios:
  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║══════════════════════════════ happy_path ═══════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: happy_path
    category: happy_path
    description: "Single action resolves and pins successfully"
    needs_token: true
    tags: [smoke]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0

  - name: already_pinned_all_valid
    category: happy_path
    description: "Already-pinned workflow validates without network calls (fast path)"
    needs_token: true
    tags: [smoke]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout
    expect:
      exit: 0

  - name: multi_action_happy
    category: happy_path
    description: "Multiple actions from different orgs all resolve"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions:
            - "actions/checkout@v4"
            - "actions/setup-go@v5"
            - "actions/cache@v4"
    expect:
      exit: 0

  - name: composite_action_transitive
    category: happy_path
    description: "Action with transitive dependencies (create-github-app-token) resolves correctly"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/create-github-app-token@v1"]
    expect:
      exit: 0

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═══════════════════════════════ sso_auth ════════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: sso_auth_failure
    category: sso_auth
    description: "SSO-gated org returns 403 with X-GitHub-SSO header"
    needs_stub: true
    tags: [smoke, stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions:
            - "actions/checkout@v4"
            - "actions/setup-go@v5"
            - "actions/cache@v4"
    expect:
      exit: 1
      output_contains:
        - "could not be resolved"
        - "actions/checkout"
        - "actions/setup-go"
        - "actions/cache"
        - "SAML enforcement"
        - "Authorize in your web browser"
      output_excludes:
        - "resolution failed:"

  - name: sso_dedup
    category: sso_auth
    description: "11 actions from same org — SSO reason shown only once"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions:
            - "actions/checkout@v4"
            - "actions/setup-go@v5"
            - "actions/cache@v4"
            - "actions/upload-artifact@v4"
            - "actions/download-artifact@v4"
            - "actions/setup-python@v5"
        deploy.yml:
          name: Deploy
          actions:
            - "actions/download-artifact@v4"
            - "actions/setup-dotnet@v4"
            - "actions/setup-node@v4"
            - "actions/create-github-app-token@v1"
            - "actions/github-script@v7"
            - "actions/stale@v9"
    expect:
      exit: 1
      output_contains:
        - "actions/checkout"
        - "actions/stale"
        - "actions/github-script"
      custom: sso_dedup_count

  - name: sso_no_fix_single_url
    category: sso_auth
    description: "--no-fix: SSO authorization URL surfaces even in read-only mode"
    needs_stub: true
    tags: [stub]
    flags: ["--no-fix"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      output_contains: ["Authorize in your web browser"]

  - name: mixed_failures
    category: sso_auth
    description: "SSO + repo-not-found — different errors not deduped"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions:
            - "actions/checkout@v4"
            - "octo-org/private-action@v1"
    expect:
      exit: 1
      output_contains:
        - "could not be resolved"
        - "actions/checkout"
        - "octo-org/private-action"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║══════════════════════════════ api_errors ═══════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: api_404_not_found
    category: api_errors
    description: "Action repo does not exist — 404 surfaced cleanly"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["nonexistent-org/nonexistent-action@v1"]
    expect:
      exit: 1
      output_contains:
        - "could not be resolved"
        - "nonexistent-org/nonexistent-action"

  - name: api_rate_limit_429
    category: api_errors
    description: "Rate limit 429 with Retry-After — retries and recovers or fails gracefully"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1

  - name: api_server_error_500
    category: api_errors
    description: "Server error 500 — fails gracefully"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1

  - name: api_unauthorized_401
    category: api_errors
    description: "Unauthorized 401 — permission denied error"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      output_contains:
        - "could not be resolved"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═══════════════════════════════ lockfile ════════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: fresh_first_run
    category: lockfile
    description: "No lockfile exists — created on first run"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0
      lockfile_exists: true

  - name: onboarded_corrupt_recovery
    category: lockfile
    description: "Corrupt YAML lockfile — user confirms delete, lockfile rewritten from scratch"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile: "{{{{invalid yaml content not parseable at all}}}}"
    input:
      - prompt: "(y/N)"
        response: "y"
    expect:
      exit: 0

  - name: onboarded_future_version
    category: lockfile
    description: "Lockfile from future version — refuses with upgrade hint"
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: future_version
    expect:
      exit: 2

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═══════════════════════════ workflow_parsing ════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: no_workflows
    category: workflow_parsing
    description: "No workflow files found — graceful error"
    tags: [smoke, stub]
    fixtures:
      workflows: {}
    expect:
      exit: 2

  - name: no_workflows_summary
    category: workflow_parsing
    description: "No workflows to check — summary says so, not 'All 0 valid'"
    tags: [stub]
    fixtures:
      workflows: {}
    expect:
      exit: 2
      output_excludes: ["All 0"]

  - name: run_only_workflow
    category: workflow_parsing
    description: "Workflow with only run: steps (no actions) — RunOnly finding"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - run: echo hello
    expect:
      exit: 0

  - name: expression_in_uses
    category: workflow_parsing
    description: "Expression-based uses: (${{ }}) — skipped with warning"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - uses: ${{ matrix.action }}
                  - uses: actions/checkout@v4
    expect:
      exit: 0

  - name: local_action_skipped
    category: workflow_parsing
    description: "Local action (./path) — entire workflow skipped"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - uses: ./my-local-action
                  - uses: actions/checkout@v4
    expect:
      exit: 0

  - name: local_action_onboarded_error
    category: workflow_parsing
    description: "Onboarded workflow adds local path action — hard error"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - uses: ./my-local-action
                  - uses: actions/checkout@v4
      lockfile_template: pinned_checkout
    expect:
      exit: 1
      output_contains: ["local path actions"]

  - name: sub_path_action
    category: workflow_parsing
    description: "Sub-path action (actions/cache/restore@v4) handled"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions:
            - "actions/cache/restore@v4"
            - "actions/cache/save@v4"
    expect:
      exit: 0

  - name: duplicate_action_refs
    category: workflow_parsing
    description: "Same action used twice in workflow — deduplicated"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4
                  - run: make build
                  - uses: actions/checkout@v4
    expect:
      exit: 0

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═════════════════════════════ output_modes ══════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: no_fix_mode
    category: output_modes
    description: "--no-fix with valid lockfile — exit 0, nothing written"
    needs_token: true
    flags: ["--no-fix"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit_any: [0, 1]

  - name: json_output_valid
    category: output_modes
    description: "--json=valid produces well-formed JSON on stdout"
    needs_token: true
    flags: ["--no-fix", "--json=valid"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit_any: [0, 1]
      stdout_is_json: true

  - name: json_output_findings
    category: output_modes
    description: "--json=findings includes findings array"
    needs_stub: true
    tags: [stub]
    flags: ["--no-fix", "--json=findings"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      stdout_is_json: true
      stdout_contains: ["findings"]

  - name: rescan_mode
    category: output_modes
    description: "--rescan forces full re-verification"
    needs_token: true
    flags: ["--rescan"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0

  - name: rescan_inconclusive_fails
    category: output_modes
    description: "--rescan with SSO-blocked verification — fails, no 'All valid'"
    needs_stub: true
    tags: [stub]
    flags: ["--rescan"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout
    expect:
      exit: 1
      output_excludes: ["All", "valid"]

  - name: no_fix_json_combined
    category: output_modes
    description: "--no-fix --json combined produces JSON without modifying disk"
    needs_stub: true
    tags: [stub]
    flags: ["--no-fix", "--json"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      stdout_is_json: true

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║════════════════════════════ multi_workflow ═════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: shared_action_across_workflows
    category: multi_workflow
    description: "Same action in multiple workflows — resolved once, tracked per-workflow"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4", "actions/setup-go@v5"]
        deploy.yml:
          name: Deploy
          actions: ["actions/checkout@v4", "actions/setup-node@v4"]
    expect:
      exit: 0

  - name: many_workflows
    category: multi_workflow
    description: "5 workflows with overlapping actions"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4", "actions/setup-go@v5"]
        test.yml:
          name: Test
          actions: ["actions/checkout@v4", "actions/cache@v4"]
        lint.yml:
          name: Lint
          actions: ["actions/checkout@v4", "actions/setup-node@v4"]
        deploy.yml:
          name: Deploy
          actions: ["actions/checkout@v4", "actions/upload-artifact@v4"]
        release.yml:
          name: Release
          actions: ["actions/checkout@v4", "actions/create-release@v1"]
    expect:
      exit: 0

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═══════════════════════════════ security ════════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: unresolved_uses_error_icon
    category: security
    description: "Unresolved actions use error severity, not warning"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      output_contains: ["could not be resolved"]

  - name: resolution_record_shown
    category: security
    description: "Resolution record path is displayed after pin"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      output_contains: ["Resolution record:"]

  - name: prefix_stripping
    category: security
    description: "Error reason prefix stripped — no 'resolution failed:' in output"
    needs_stub: true
    tags: [stub]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      output_excludes: ["resolution failed:"]
      output_contains: ["SAML enforcement"]

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║═══════════════════════════════ narrowing ═══════════════════════════════║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: fresh_v4_narrows_to_full
    category: narrowing
    description: "Default: v4 tag narrows to full semver (e.g. v4.2.1)"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0
      lockfile_comment_matches: 'v4\.\d+\.\d+'

  - name: fresh_full_tag_unchanged
    category: narrowing
    description: "Full semver v4.2.0 is already precise — no narrowing"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4.2.0"]
    expect:
      exit: 0
      lockfile_comment_matches: 'v4\.2\.0'

  - name: fresh_branch_ref_narrows
    category: narrowing
    description: "Branch ref (main) on public action narrows to full semver"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@main"]
    expect:
      exit: 0
      lockfile_comment_matches: 'v\d+\.\d+\.\d+'

  - name: fresh_branch_ref_no_narrow
    category: narrowing
    description: "--no-narrow: branch ref (main) stays as main"
    needs_token: true
    flags: ["--no-narrow"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@main"]
    expect:
      exit: 0
      lockfile_comment_matches: 'main'

  - name: onboarded_branch_ref_narrows
    category: narrowing
    description: "Onboarded workflow at @main — verified dep narrowing upgrades to full semver"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@main"]
      lockfile_template: pinned_checkout_main
    expect:
      exit: 0
      lockfile_comment_matches: 'v\d+\.\d+\.\d+'

  - name: local_action_only
    category: workflow_parsing
    description: "Workflow with only local path actions (no remote refs) — skipped cleanly"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          raw: |
            name: CI
            on: push
            jobs:
              build:
                runs-on: ubuntu-latest
                steps:
                  - uses: ./.github/actions/my-action
                  - uses: ./.github/actions/other-action
    expect:
      exit: 0

  - name: fresh_no_narrow_keeps_major
    category: narrowing
    description: "--no-narrow: splat ref v4 stays v4 in lockfile (not narrowed to v4.x.y)"
    needs_token: true
    flags: ["--no-narrow"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0
      lockfile_comment_excludes: 'v4\.\d+\.\d+'

  - name: fresh_no_narrow_full_tag
    category: narrowing
    description: "--no-narrow: full semver v4.2.0 passes through unchanged (already precise)"
    needs_token: true
    flags: ["--no-narrow"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4.2.0"]
    expect:
      exit: 0
      lockfile_comment_matches: 'v4\.2\.0'

  - name: onboarded_sticky_imprecise
    category: narrowing
    description: "Lockfile has splat ref v4 from prior --no-narrow run — re-pin without --no-narrow still keeps v4 (sticky precision)"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout_v4_imprecise
    expect:
      exit: 0
      lockfile_comment_excludes: 'v4\.\d+\.\d+'

  - name: onboarded_full_tag_unchanged
    category: narrowing
    description: "Lockfile dep key is v4.2.0 (from prior narrowed pin), workflow says @v4 (never locked as v4) — re-pin keeps the lockfile's full semver precision"
    needs_token: true
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout_full
    expect:
      exit: 0
      lockfile_comment_matches: 'v4\.\d+\.\d+'

  - name: onboarded_no_narrow_keeps_major
    category: narrowing
    description: "--no-narrow on onboarded workflow — splat ref v4 stays v4 in lockfile, semver nudge suppressed"
    needs_token: true
    flags: ["--no-narrow"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout
    expect:
      exit: 0
      lockfile_comment_excludes: 'v4\.\d+\.\d+'
      output_excludes: ["pinned without a full semver tag"]

  - name: fresh_no_narrow_nudge_suppressed
    category: narrowing
    description: "--no-narrow: version-ref nudge is suppressed"
    needs_token: true
    flags: ["--no-narrow"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 0
      output_excludes: ["Consider using full semver"]

  - name: fresh_no_fix_no_narrow_json_version_ref
    category: narrowing
    description: "--no-fix --no-narrow --json=findings: reports not-pinned finding, no version-ref noise"
    needs_token: true
    flags: ["--no-narrow", "--no-fix", "--json=findings"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
    expect:
      exit: 1
      stdout_is_json: true
      stdout_excludes: ["version-ref"]
      jq:
        - expr: '.findings | length'
          equals: 1
        - expr: '.findings[0].category'
          equals: 'not-pinned'
        - expr: '.findings[0].dependency'
          contains: 'actions/checkout'

  - name: transitive_major_ref_not_narrowed
    category: narrowing
    description: "Transitive dep of a composite keeps the major ref the composite declares (actions/setup-go@v5 stays v5, not narrowed to v5.x.y) — we don't own composite-internal refs"
