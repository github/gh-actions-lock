  # ╚═════════════════════════════════════════════════════════════════════════╝
  # These scenarios test the contract surface consumed by dependabot-core's
  # CliEngine (cli_engine.rb). Every scenario runs with the dependabot flag
  # set: --no-onboard --no-narrow --no-interactive --json=valid,findings,workflows
  #
  # The jq assertions verify the JSON shape that dependabot-core's
  # FindingMapper relies on. Changes here must be coordinated with
  # dependabot/dependabot-core github_actions ecosystem.

  - name: dbot_onboarded_clean
    category: dependabot
    description: "All pinned, no findings — exit 0, valid true, empty findings"
    needs_token: true
    flags: ["--no-onboard", "--no-narrow", "--no-interactive", "--json=valid,findings,workflows"]
    fixtures:
      workflows:
        ci.yml:
          name: CI
          actions: ["actions/checkout@v4"]
      lockfile_template: pinned_checkout
    expect:
      exit: 0
      stdout_is_json: true
      jq:
        - expr: ".valid"
          equals: "true"
        - expr: ".findings | length"
          equals: "0"
        - expr: ".workflows | length"
          equals: "1"
        - expr: ".workflows[0].path"
          contains: "ci.yml"
        - expr: ".workflows[0].valid"
          equals: "true"

      golden_json:
        cli_version: (devel)
        findings: []
        lockfile_version: v0.0.1
        valid: true
        workflows:
          - dependencies:
              - direct: true
                hash_algo: sha1
                nwo: actions/checkout
                ref: v4
                sha: de0fac2e4500dabe0009e67214ff5f5447ce83dd
            findings: []
            path: .github/workflows/ci.yml
            valid: true
