# Scenario: Action uses a bare SHA instead of a tag ref.
# The tool detects this and offers tag suggestions with semver ranking.
name: SHA-as-ref demo
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nodeselector/actions-test-fixtures/nested-composite@ea53476fdc172d8552df5af9658a45a367e4f41d
