# Stub CI workflow for the future github.com/github/actions-lockfile repository.
#
# This file is staged here to preview what the new repo's CI will look like.
# It is NOT wired up in github/gh-actions-pin's Actions runs — that repository's
# CI continues to test pkg/lockfile/ via the parent module's test suite.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt -l found unformatted files:"
            echo "$out"
            exit 1
          fi
