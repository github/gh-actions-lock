name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: OIDC Setup for goproxy
        uses: github/setup-goproxy@v1.1.0
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  integration-stub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: OIDC Setup for goproxy
        uses: github/setup-goproxy@v1.1.0
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Install Ruby
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby
          ruby --version
      - run: make build
      - run: make test-stub

  integration-live:
    runs-on: ubuntu-latest
    # Separate job so flakes don't block merge
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: OIDC Setup for goproxy
        uses: github/setup-goproxy@v1.1.0
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Install Ruby
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby
          ruby --version
      - run: make build
      - run: make test-integration

  lockfile-lint:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write
    steps:
      - name: OIDC Setup for goproxy
        uses: github/setup-goproxy@v1.1.0
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - run: make build

      - name: Check lockfile is in sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          output=$(./gh-actions-lock --no-fix --no-interactive --json=valid,findings,workflows 2>&1)
          exit_code=$?
          set -e

          valid=$(echo "$output" | jq -r '.valid // empty' 2>/dev/null)
          findings=$(echo "$output" | jq -r '.findings // [] | length' 2>/dev/null)

          # Log findings
          if [ "$findings" != "0" ] && [ -n "$findings" ]; then
            echo ""
            echo "::group::Findings ($findings)"
            echo "$output" | jq -r '.findings[] | "::error file=\(.workflow)::[\(.category)] \(.dependency): \(.detail)"'
            echo "::endgroup::"
          fi

          # Log per-workflow status
          echo ""
          echo "::group::Workflow status"
          echo "$output" | jq -r '.workflows[] | "\(if .valid then "✅" else "❌" end) \(.path) — \(.findings | length) finding(s)"'
          echo "::endgroup::"

          # Show what a fix would change
          if [ "$exit_code" -ne 0 ]; then
            echo ""
            echo "::group::Lockfile diff (what gh actions-lock would change)"
            cp .github/workflows/actions.lock .github/workflows/actions.lock.bak 2>/dev/null || true
            ./gh-actions-lock --no-interactive 2>/dev/null || true
            diff -u .github/workflows/actions.lock.bak .github/workflows/actions.lock || true
            git checkout -- . 2>/dev/null
            echo "::endgroup::"
          fi

          # Job summary
          {
            echo "## Lockfile lint"
            echo ""
            if [ "$valid" = "true" ]; then
              echo "✅ Lockfile is in sync."
            else
              echo "❌ Lockfile is **out of sync**. Run \`gh actions-lock\` to fix."
              echo ""
              echo "### Findings"
              echo ""
              echo "| Workflow | Category | Dependency | Detail |"
              echo "|----------|----------|------------|--------|"
              echo "$output" | jq -r '.findings[] | "| `\(.workflow)` | \(.category) | `\(.dependency)` | \(.detail) |"'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $exit_code