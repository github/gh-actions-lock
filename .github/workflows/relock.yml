name: Relock actions.lock

on:
  workflow_call:
    inputs:
      # Extra flags passed to `gh actions-lock` (e.g. "--allow-runners foo").
      extra-flags:
        type: string
        default: ""
      # The PR head branch to check out and push back to. Required because
      # github.head_ref is not available inside workflow_call context.
      head-ref:
        type: string
        required: true

jobs:
  relock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.head-ref }}

      - name: Install gh-actions-lock
        run: gh extension install github/gh-actions-lock

      - name: Relock
        run: gh actions-lock --no-onboard --no-interactive ${{ inputs.extra-flags }}

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/actions.lock
          if git diff --cached --quiet; then
            echo "Lockfile already up to date"
          else
            git commit -m "Relock actions.lock after dependency update"
            git push
          fi
