name: sync early access release

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to sync.
        required: true
        type: string
    secrets:
      ACTIONS_LOCKED_DEPENDENCIES_RELEASE_PAT:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync.
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Publish early access release
        env:
          SOURCE_TOKEN: ${{ github.token }}
          TARGET_TOKEN: ${{ secrets.ACTIONS_LOCKED_DEPENDENCIES_RELEASE_PAT }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          TARGET_REPOSITORY: github-early-access/actions-locked-dependencies
          RELEASE_TAG: ${{ inputs.tag }}
        run: script/sync-early-access-release "$RELEASE_TAG"

# Automatically generated and managed by: `gh actions-pin --write <workflow-path>`
dependencies:
  - actions/checkout@v6:sha1-de0fac2e4500dabe0009e67214ff5f5447ce83dd
